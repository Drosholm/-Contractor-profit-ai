<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Profit Advisor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      white-space: normal; /* vigtig */
    }
  </style>
</head>
<body>

<h2>AI Profit Advisor</h2>

<label>Currency</label>
<select id="currency">
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="GBP">GBP</option>
  <option value="AUD">AUD</option>
</select>

<label>Current Hourly Rate</label>
<input id="currentRate" type="number">

<label>Required Hourly Rate</label>
<input id="requiredRate" type="number">

<label>Billable Hours Per Year</label>
<input id="hours" type="number">

<button onclick="analyse()">Analyze My Business</button>

<div id="result"></div>

<script>
async function analyse() {
  const currency = document.getElementById("currency").value;
  const currentRate = document.getElementById("currentRate").value;
  const requiredRate = document.getElementById("requiredRate").value;
  const hours = document.getElementById("hours").value;

  document.getElementById("result").innerHTML = "Analyzing...";

  try {
    const response = await fetch("/api/analyse", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        currency,
        currentRate,
        requiredRate,
        hours
      })
    });

    const data = await response.json();

    document.getElementById("result").innerHTML =
      data.result || "No response from AI.";

  } catch (error) {
    document.getElementById("result").innerHTML =
      "Error connecting to server.";
  }
}
</script>

</body>
</html>
