<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Profit Advisor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }
    h3 {
      margin-top: 30px;
    }
    hr {
      margin: 30px 0;
    }
    #result {
      margin-top: 30px;
      white-space: normal;
    }
  </style>
</head>
<body>

<h2>AI Profit Advisor</h2>

<label>Currency</label>
<select id="currency">
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="GBP">GBP</option>
  <option value="AUD">AUD</option>
</select>

<label>Current Hourly Rate</label>
<input id="currentRate" type="number">

<label>Target Hourly Rate</label>
<input id="requiredRate" type="number">

<label>Billable Hours Per Year</label>
<input id="hours" type="number">

<hr>

<h3>Business Details</h3>

<label>Average Material Cost (% of revenue)</label>
<input id="materialPercent" type="number" placeholder="e.g. 35">

<label>Estimated Annual Overhead</label>
<input id="overhead" type="number" placeholder="e.g. 45000">

<label>Number of Employees (including yourself)</label>
<input id="employees" type="number">

<label>Average Project Size</label>
<input id="projectSize" type="number" placeholder="e.g. 12000">

<button onclick="analyse()">Analyze My Business</button>

<div id="result"></div>

<script>
async function analyse() {

  const currency = document.getElementById("currency").value;
  const currentRate = document.getElementById("currentRate").value;
  const requiredRate = document.getElementById("requiredRate").value;
  const hours = document.getElementById("hours").value;

  const materialPercent = document.getElementById("materialPercent").value;
  const overhead = document.getElementById("overhead").value;
  const employees = document.getElementById("employees").value;
  const projectSize = document.getElementById("projectSize").value;

  document.getElementById("result").innerHTML = "Analyzing your business...";

  try {

    const response = await fetch("/api/analyse", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        currency,
        currentRate,
        requiredRate,
        hours,
        materialPercent,
        overhead,
        employees,
        projectSize
      })
    });

    const data = await response.json();

    document.getElementById("result").innerHTML =
      data.result || "No response from AI.";

  } catch (error) {

    document.getElementById("result").innerHTML =
      "Error connecting to server.";

  }
}
</script>

</body>
</html>
