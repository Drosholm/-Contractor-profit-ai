<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Profit Advisor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

#result {
  margin-top: 30px;
}

.card {
  background: #f4f4f4;
  padding: 20px;
  margin-top: 20px;
  border-radius: 8px;
}

.green { color: green; }
.red { color: red; }

.bar {
  height: 14px;
  background: #ddd;
  border-radius: 7px;
  margin-top: 6px;
  overflow: hidden;
}

.fill {
  height: 100%;
}
</style>
</head>
<body>

<h2>AI Profit Advisor</h2>

<label>Currency</label>
<select id="currency">
<option value="$">$</option>
<option value="€">€</option>
<option value="£">£</option>
<option value="A$">A$</option>
</select>

<label>Current Revenue</label>
<input id="currentRevenue" type="number">

<label>Target Revenue</label>
<input id="targetRevenue" type="number">

<label>Material Cost</label>
<input id="materialCost" type="number">

<label>Overhead</label>
<input id="overhead" type="number">

<label>Net Profit</label>
<input id="netProfit" type="number">

<label>Profit Margin (%)</label>
<input id="profitMargin" type="number">

<button onclick="generateReport()">Generate Report</button>

<button onclick="downloadPDF()">Download PDF</button>

<div id="result"></div>

<script>

function generateReport() {

  const currency = document.getElementById("currency").value;
  const currentRevenue = Number(document.getElementById("currentRevenue").value);
  const targetRevenue = Number(document.getElementById("targetRevenue").value);
  const materialCost = Number(document.getElementById("materialCost").value);
  const overhead = Number(document.getElementById("overhead").value);
  const netProfit = Number(document.getElementById("netProfit").value);
  const profitMargin = Number(document.getElementById("profitMargin").value);

  const incomeGap = targetRevenue - currentRevenue;

  const revenuePercent = targetRevenue > 0 ? (currentRevenue / targetRevenue) * 100 : 0;
  const costPercent = currentRevenue > 0 ? ((materialCost + overhead) / currentRevenue) * 100 : 0;

  document.getElementById("result").innerHTML = `
    <div id="pdfContent">

      <div class="card">
        <h3>Financial Overview</h3>
        <p><strong>Current Revenue:</strong> ${currency}${currentRevenue.toLocaleString()}</p>
        <p><strong>Target Revenue:</strong> ${currency}${targetRevenue.toLocaleString()}</p>
        <p><strong>Income Gap:</strong> 
        <span class="${incomeGap > 0 ? 'red' : 'green'}">
        ${currency}${incomeGap.toLocaleString()}
        </span></p>
      </div>

      <div class="card">
        <h3>Profit Metrics</h3>
        <p><strong>Net Profit:</strong> <span class="green">${currency}${netProfit.toLocaleString()}</span></p>
        <p><strong>Profit Margin:</strong> ${profitMargin}%</p>
      </div>

      <div class="card">
        <h3>Revenue Progress</h3>
        <div class="bar">
          <div class="fill" style="width:${revenuePercent}%; background:green;"></div>
        </div>

        <h3 style="margin-top:20px;">Cost Structure</h3>
        <div class="bar">
          <div class="fill" style="width:${costPercent}%; background:red;"></div>
        </div>
      </div>

    </div>
  `;
}

function downloadPDF() {

  const element = document.getElementById("pdfContent");

  html2pdf().from(element).set({
    margin: 10,
    filename: "Contractor-Profit-Report.pdf",
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).save();
}

</script>

</body>
</html>
