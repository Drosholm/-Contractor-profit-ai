<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Profit Advisor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    button.secondary {
      background: #444;
    }

    #result {
      margin-top: 30px;
      white-space: normal;
    }

    hr {
      margin: 30px 0;
    }
  </style>
</head>
<body>

<h2>AI Profit Advisor</h2>

<label>Currency</label>
<select id="currency">
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="GBP">GBP</option>
  <option value="AUD">AUD</option>
</select>

<label>Current Hourly Rate</label>
<input id="currentRate" type="number">

<label>Target Hourly Rate</label>
<input id="requiredRate" type="number">

<label>Billable Hours Per Year</label>
<input id="hours" type="number">

<hr>

<h3>Business Details</h3>

<label>Average Material Cost (% of revenue)</label>
<input id="materialPercent" type="number" placeholder="e.g. 30">

<label>Estimated Annual Overhead</label>
<input id="overhead" type="number" placeholder="e.g. 35000">

<label>Number of Employees</label>
<input id="employees" type="number">

<label>Average Project Value</label>
<input id="projectSize" type="number" placeholder="e.g. 12000">

<button onclick="analyse()">Analyze My Business</button>

<button class="secondary" onclick="downloadPDF()">
  Download PDF Report
</button>

<div id="result"></div>

<script>

let latestReportData = null;

async function analyse() {

  const data = {
    currency: document.getElementById("currency").value,
    currentRate: document.getElementById("currentRate").value,
    requiredRate: document.getElementById("requiredRate").value,
    hours: document.getElementById("hours").value,
    materialPercent: document.getElementById("materialPercent").value,
    overhead: document.getElementById("overhead").value,
    employees: document.getElementById("employees").value,
    projectSize: document.getElementById("projectSize").value
  };

  document.getElementById("result").innerHTML = "Analyzing...";

  const response = await fetch("/api/analyse", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await response.json();

  document.getElementById("result").innerHTML = result.result;

  // === CALCULATE SAME NUMBERS FOR PDF ===
  const currentRevenue = data.currentRate * data.hours;
  const targetRevenue = data.requiredRate * data.hours;
  const incomeGap = targetRevenue - currentRevenue;
  const materialCost = currentRevenue * (data.materialPercent / 100);
  const netProfit = currentRevenue - materialCost - data.overhead;
  const profitMargin = currentRevenue > 0
    ? ((netProfit / currentRevenue) * 100).toFixed(1)
    : 0;
  const breakEvenRevenue = data.materialPercent < 100
    ? data.overhead / (1 - data.materialPercent / 100)
    : 0;
  const projectsNeeded = data.projectSize > 0
    ? Math.ceil(targetRevenue / data.projectSize)
    : 0;

  latestReportData = {
    currency: data.currency,
    currentRevenue,
    targetRevenue,
    incomeGap,
    materialCost,
    overhead: data.overhead,
    netProfit,
    profitMargin,
    breakEvenRevenue: Math.round(breakEvenRevenue),
    projectsNeeded
  };
}

async function downloadPDF() {

  if (!latestReportData) {
    alert("Please run analysis first.");
    return;
  }

  const response = await fetch("/api/generate-pdf", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(latestReportData)
  });

  const blob = await response.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "Business-Profit-Analysis.pdf";
  a.click();
}

</script>

</body>
</html>
